spring.application.name=aaradhana
server.port=${SERVER_PORT:8089}

# ✅ MongoDB Configuration (SECURED - Use environment variables)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/productdb}

# ✅ MongoDB Performance Optimizations
spring.data.mongodb.auto-index-creation=true
spring.data.mongodb.connection-timeout=30000
spring.data.mongodb.socket-timeout=30000
spring.data.mongodb.max-connection-idle-time=60000
spring.data.mongodb.max-connection-life-time=120000

# Connection Pool Settings
spring.data.mongodb.min-connections-per-host=10
spring.data.mongodb.max-connections-per-host=50
spring.data.mongodb.threads-allowed-to-block-for-connection-multiplier=5

# Server Performance
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.connection-timeout=30000
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain

# ✅ Email Configuration (SECURED - Use environment variables)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME:5diffguys@gmail.com}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=30000
spring.mail.properties.mail.smtp.timeout=30000
spring.mail.properties.mail.smtp.writetimeout=30000

# Application URL (SECURED - Use environment variables)
app.url=${APP_URL:http://localhost:3000}

# SendGrid Configuration (SECURED - Use environment variables)
sendgrid.api.key=${SENDGRID_API_KEY:}
sendgrid.from.email=${SENDGRID_FROM_EMAIL:5diffguys@gmail.com}
sendgrid.from.name=${SENDGRID_FROM_NAME:Aaradhana}
admin.email=${ADMIN_EMAIL:aaradhana@gmail.com}

# Google OAuth (SECURED - Use environment variables)
google.clientId=${GOOGLE_CLIENT_ID:318483681270-nk40s4dkuea0g3o30puug6j00relnrr3.apps.googleusercontent.com}

# Razorpay Configuration (SECURED - Use environment variables)
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET:}

# JWT Secret (SECURED - Use environment variables)
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokensThatIs256BitsLongAndSecureEnoughForHMACAlgorithm}
